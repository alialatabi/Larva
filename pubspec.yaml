name: larva
description: "A massive multiplayer online economic life simulation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0
  google_fonts: ^8.0.0
  intl: ^0.19.0
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.0
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

dev_dependencies:
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
